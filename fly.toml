# fly.toml app configuration file generated for jira-user-actions-audit-report
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'jira-user-actions-audit-report'
primary_region = 'ams'

[build]

[env]
  DATA_DIR = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # keep alive so the scheduler never misses a run
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[mounts]]
  source = "appdata"
  destination = "/data"        # credentials, schedule, groups, reports all persist here

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
